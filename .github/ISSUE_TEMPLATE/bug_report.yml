name: Bug Report
description: Report a bug in an Iteration Layer SDK or API
labels: ["bug"]
body:
  - type: dropdown
    id: sdk
    attributes:
      label: SDK / Product
      options:
        - TypeScript/Node.js SDK
        - Python SDK
        - Go SDK
        - Ruby SDK
        - PHP SDK
        - Rust SDK
        - API (not SDK-specific)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK Version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
