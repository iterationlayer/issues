name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: sdk
    attributes:
      label: SDK / Product
      options:
        - TypeScript/Node.js SDK
        - Python SDK
        - Go SDK
        - Ruby SDK
        - PHP SDK
        - Rust SDK
        - API (not SDK-specific)
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would this help your workflow?
    validations:
      required: true
